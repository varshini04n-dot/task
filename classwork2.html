<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box model</title>
    <style>

.outer {
    border: 10px solid black;
    padding: 30px;
    text-align: center;
    margin:10px;
}
.middle{
    border:5px dashed black;
    padding:24px;
    text-align: center;
    margin:10px;
}
.inner{
    border:2px solid black;
    padding:20px;
    text-align: center;
    margin:10px;

}

    </style>
</head>
<body>
   <div class="outer">
    <h1>Outer layer</h1>
    <div class="middle">
    <h2>middle layer</h2>
    <div class="inner">
        <h3>inner layer</h3>
    </div>
    </div>
   </div>
</body>
</html>
