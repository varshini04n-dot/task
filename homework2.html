<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>

    <style>
    

        .card{
            border: 10px ridge black; 
            border-radius: 15px ;
            padding: 20px;           
            margin: 30px auto;      
            width: 25%;
            height: 400px;
            text-align: center;
        }

        .card img{
            max-width: 5000%;
            min-width: 200px;
            width: 300px;
            height: 200px;
            border-radius: 10px;
        }

        h2{
            margin: 15px 0;
        }

        p{
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1 style="text-align:center;">Product Card</h1>

    <div class="card">
        <h2>HP Laptop</h2>

        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853"
             alt="Laptop">

        <p>
            HP Pavilion Plus 14" is a powerful laptop designed for
            productivity and entertainment with advanced features and
            sleek design.
        </p>
    </div>

</body>
</html>
